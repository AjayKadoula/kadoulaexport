name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Optional native/browser deps (better-sqlite3, electron, playwright) are
      # allowed to fail; the suite runs fully on the JSON storage fallback and
      # the fixture/simulated runtimes.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
